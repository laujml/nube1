<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudShop — Catalogo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="topnav">
    <span class="brand">CloudShop</span>
    <span id="nav-role" class="role-badge"></span>
    <a href="shop.html">Catalogo</a>
    <a href="orders.html">Mis pedidos</a>
    <a id="nav-dashboard" href="dashboard.html" style="display:none">Dashboard</a>
    <button id="btn-logout" type="button">Salir</button>
  </nav>

  <main class="layout">
    <section class="products">
      <h2>Productos</h2>
      <p id="products-error" class="error" style="display:none"></p>
      <div id="products-grid" class="grid"></div>
    </section>

    <aside id="cart-panel" class="cart">
      <h2>Carrito</h2>
      <p id="cart-error" class="error" style="display:none"></p>
      <div id="cart-items"></div>
      <div class="cart-total">Total: <strong id="cart-total">$0.00</strong></div>
      <button id="btn-checkout" type="button">Crear pedido</button>
      <p id="checkout-msg" class="success" style="display:none"></p>
    </aside>
  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>
  <script>
    requireAuth();
    document.getElementById("nav-role").textContent = AUTH.getRole();
    document.getElementById("btn-logout").onclick = logout;
    if (["admin", "operator"].includes(AUTH.getRole())) {
      document.getElementById("nav-dashboard").style.display = "inline";
    }
    const isCustomer = AUTH.getRole() === "customer";
    if (!isCustomer) document.getElementById("cart-panel").style.display = "none";

    async function loadProducts() {
      try {
        const data = await apiFetch("/v1/products");
        renderProducts(data.products || []);
      } catch (err) {
        showError("products-error", err.message);
      }
    }

    function renderProducts(products) {
      const grid = document.getElementById("products-grid");
      grid.innerHTML = "";
      products.forEach((p) => {
        const card = document.createElement("div");
        card.className = "product-card";
        card.innerHTML = `
          <h3>${p.name}</h3>
          <p class="muted">${p.description || ""}</p>
          <p class="price">${money(p.price)}</p>
          <p class="muted">Stock: ${p.stock}</p>
          ${isCustomer ? `<button data-id="${p.product_id}" ${p.stock < 1 ? "disabled" : ""}>Agregar al carrito</button>` : ""}
        `;
        if (isCustomer) {
          card.querySelector("button").onclick = () => addToCart(p.product_id);
        }
        grid.appendChild(card);
      });
    }

    async function addToCart(productId) {
      try {
        await apiFetch("/v1/cart", {
          method: "POST",
          body: JSON.stringify({ product_id: productId, quantity: 1 }),
        });
        await loadCart();
      } catch (err) {
        showError("cart-error", err.message);
      }
    }

    async function loadCart() {
      if (!isCustomer) return;
      try {
        const data = await apiFetch("/v1/cart");
        renderCart(data.items || []);
      } catch (err) {
        showError("cart-error", err.message);
      }
    }

    function renderCart(items) {
      const container = document.getElementById("cart-items");
      container.innerHTML = "";
      let total = 0;
      items.forEach((item) => {
        total += item.unit_price * item.quantity;
        const row = document.createElement("div");
        row.className = "cart-row";
        row.innerHTML = `
          <span>${item.product_id}</span>
          <input type="number" min="1" value="${item.quantity}" data-id="${item.product_id}" class="qty-input" />
          <span>${money(item.unit_price * item.quantity)}</span>
          <button data-id="${item.product_id}" class="remove-btn">x</button>
        `;
        row.querySelector(".qty-input").onchange = (e) =>
          updateQuantity(item.product_id, Number(e.target.value));
        row.querySelector(".remove-btn").onclick = () => removeFromCart(item.product_id);
        container.appendChild(row);
      });
      document.getElementById("cart-total").textContent = money(total);
    }

    async function updateQuantity(productId, quantity) {
      try {
        await apiFetch(`/v1/cart/${productId}`, {
          method: "PUT",
          body: JSON.stringify({ quantity }),
        });
        await loadCart();
      } catch (err) {
        showError("cart-error", err.message);
      }
    }

    async function removeFromCart(productId) {
      try {
        await apiFetch(`/v1/cart/${productId}`, { method: "DELETE" });
        await loadCart();
      } catch (err) {
        showError("cart-error", err.message);
      }
    }

    document.getElementById("btn-checkout").onclick = async () => {
      try {
        await apiFetch("/v1/orders", { method: "POST" });
        document.getElementById("checkout-msg").textContent = "Pedido creado exitosamente.";
        document.getElementById("checkout-msg").style.display = "block";
        await loadCart();
      } catch (err) {
        showError("cart-error", err.message);
      }
    };

    loadProducts();
    loadCart();
  </script>
</body>
</html>
